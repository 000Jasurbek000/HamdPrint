{% extends 'base.html' %}

{% block title %}{{ category.name }}{% endblock %}

{% block content %}
<section class="page-hero page-hero--compact">
  <div class="container">
    <h1 class="page-hero__title">{{ category.name }}</h1>
    <p class="page-hero__subtitle">{{ books.count }} ta kitob</p>
  </div>
</section>

<section class="page-content">
  <div class="container">
    <div class="books-grid">
      {% for book in books %}
        {% include 'partials/book_card.html' with book=book %}
      {% empty %}
      <p class="empty-state">Bu kategoriyada kitoblar yo'q.</p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
