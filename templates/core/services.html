{% extends 'base.html' %}

{% block title %}Xizmatlar{% endblock %}

{% block content %}
<section class="page-hero">
  <div class="container">
    <h1 class="page-hero__title">Xizmatlar</h1>
    <p class="page-hero__subtitle">BUKHARA HAMD PRINT professional nashriyot xizmatlari</p>
  </div>
</section>

<section class="page-content">
  <div class="container">
    <div class="services-grid">
      {% for service in services %}
      <a href="{{ service.get_absolute_url }}" class="service-card">
        <div class="service-card__icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <h3>{{ service.title }}</h3>
        <p>{{ service.short_description }}</p>
        <span class="btn-batafsil btn-batafsil--auto btn-batafsil--sm">
          <span>Batafsil</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </span>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
