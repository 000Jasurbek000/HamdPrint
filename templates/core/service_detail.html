{% extends 'base.html' %}

{% block title %}{{ service.title }}{% endblock %}

{% block content %}
<section class="page-hero">
  <div class="container">
    <h1 class="page-hero__title">{{ service.title }}</h1>
    <p class="page-hero__subtitle">{{ service.short_description }}</p>
  </div>
</section>

<section class="page-content">
  <div class="container">
    <div class="service-detail">
      <p>{{ service.description }}</p>
      <a href="{% url 'core:contact' %}" class="btn btn--gold">Buyurtma berish</a>
      <a href="{% url 'core:services' %}" class="btn btn--ghost-dark">← Barcha xizmatlar</a>
    </div>
  </div>
</section>
{% endblock %}
