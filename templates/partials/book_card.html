<div class="book-card">
  <a href="{{ book.get_absolute_url }}" class="book-card__cover">
    <img src="{{ book.cover_url }}" alt="{{ book.title }}" loading="lazy">
  </a>
  <h3 class="book-card__title"><a href="{{ book.get_absolute_url }}">{{ book.title }}</a></h3>
  {% if book.author %}<p class="book-card__author">{{ book.author.name }}</p>{% endif %}
  <div class="book-card__actions">
    <a href="{{ book.read_url }}" class="btn btn--read btn--sm" {% if book.read_online_url %}target="_blank" rel="noopener"{% endif %}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      O'qish
    </a>
    {% if book.pdf_url %}
    <a href="{{ book.pdf_url }}" class="btn btn--download btn--sm" target="_blank" rel="noopener" download>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PDF
    </a>
    {% endif %}
  </div>
</div>
