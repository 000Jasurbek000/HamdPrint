{% extends 'base.html' %}

{% block title %}Kirish{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1>Kirish</h1>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<span class="form-error">{{ field.errors.0 }}</span>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn--gold" style="width:100%">Kirish</button>
    </form>
    <p class="auth-link">Hisobingiz yo'qmi? <a href="{% url 'accounts:register' %}">Ro'yxatdan o'ting</a></p>
  </div>
</section>
{% endblock %}
